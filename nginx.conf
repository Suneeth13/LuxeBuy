server {
    # Cloud Run expects the container to listen on the port specified by the $PORT env variable, 
    # but 8080 is the standard container port Cloud Run uses internally if you build locally.
    listen 8080;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        
        # SPA routing: fallback to index.html
        try_files $uri $uri/ /index.html;
    }

    # Optional: Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        root /usr/share/nginx/html;
        expires max;
        log_not_found off;
    }
}
